<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo dyg++</title>
    <style>
        :root { --red: #ff4d4d; --blue: #2e86de; --green: #2ecc71; --yellow: #f1c40f; --primary: #1B4332; }
        body { margin: 0; background: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #ludo-board { width: 320px; height: 320px; display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr); border: 4px solid #333; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .cell { border: 0.1px solid #ddd; background: white; }
        /* Area Rumah */
        .home-red { grid-column: 1/7; grid-row: 1/7; background: var(--red); border: 4px solid white; }
        .home-green { grid-column: 10/16; grid-row: 1/7; background: var(--green); border: 4px solid white; }
        .home-yellow { grid-column: 1/7; grid-row: 10/16; background: var(--yellow); border: 4px solid white; }
        .home-blue { grid-column: 10/16; grid-row: 10/16; background: var(--blue); border: 4px solid white; }
        .center-finish { grid-column: 7/10; grid-row: 7/10; background: #333; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; }
        /* Jalur Warna */
        .path-red { background: var(--red); } .path-green { background: var(--green); }
        .path-yellow { background: var(--yellow); } .path-blue { background: var(--blue); }
        /* Kontrol */
        .controls { margin-top: 20px; text-align: center; }
        #dice { width: 60px; height: 60px; background: white; border: 3px solid var(--primary); border-radius: 12px; font-size: 30px; font-weight: 900; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 0 var(--primary); transition: 0.1s; margin: 0 auto; }
        #dice:active { transform: translateY(4px); box-shadow: none; }
        .status { margin-top: 10px; font-weight: 900; color: var(--primary); }
    </style>
</head>
<body>
    <div style="font-weight: 900; color: var(--primary); margin-bottom: 15px;">LUDO ARENA dyg++</div>
    
    <div id="ludo-board">
        <div class="home-red"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="home-green"></div>
        <div class="cell path-red"></div><div class="cell path-red"></div><div class="cell path-red"></div>
        <div class="center-finish">FINISH</div>
        <div class="home-yellow"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="home-blue"></div>
    </div>

    <div class="controls">
        <div id="dice" onclick="rollDice()">🎲</div>
        <div class="status" id="status">KLIK DADU UNTUK JALAN</div>
    </div>

    <script>
        function rollDice() {
            const dice = document.getElementById('dice');
            const status = document.getElementById('status');
            dice.style.pointerEvents = 'none';
            
            let count = 0;
            let interval = setInterval(() => {
                dice.innerHTML = Math.floor(Math.random() * 6) + 1;
                count++;
                if(count > 10) {
                    clearInterval(interval);
                    let result = Math.floor(Math.random() * 6) + 1;
                    dice.innerHTML = result;
                    status.innerHTML = "ANDA MENDAPAT ANGKA " + result;
                    dice.style.pointerEvents = 'auto';
                    
                    if(result == 6) {
                        status.innerHTML = "ANGKA 6! KELUARKAN BIDAK!";
                    }
                }
            }, 50);
        }
    </script>
</body>
</html>
