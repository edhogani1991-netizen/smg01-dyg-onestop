<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>🎲 LUDO PRO FULL</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{
    margin:0;
    background:#0b3d2e;
    color:#fff;
    font-family:Segoe UI,Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.app{
    width:420px;
    background:#111;
    border-radius:18px;
    box-shadow:0 0 40px #00ffcc;
    padding:12px;
}
h1{text-align:center;color:#00ffcc}
canvas{
    background:#fff;
    border-radius:12px;
    display:block;
    margin:auto;
}
.controls{text-align:center;margin-top:10px}
button,select{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:6px;
    font-weight:bold;
}
button{background:linear-gradient(135deg,#00ffcc,#00ccff)}
.dice{font-size:40px;margin:6px}
.info{font-size:14px}
</style>
</head>

<body>
<div class="app">
<h1>🎲 LUDO PRO</h1>

<select id="mode">
  <option value="1">1 Player vs AI</option>
  <option value="2">2 Player</option>
  <option value="4">4 Player</option>
</select>

<button onclick="startGame()">▶ MULAI</button>

<canvas id="board" width="360" height="360"></canvas>

<div class="controls">
  <div class="dice" id="dice">🎲</div>
  <button onclick="rollDice()">ROLL</button>
  <div class="info" id="info"></div>
</div>
</div>

<script>
/* ====== CORE DATA ====== */
const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");
const diceEl=document.getElementById("dice");
const info=document.getElementById("info");

const COLORS=["red","green","yellow","blue"];
const EMOJI=["🔴","🟢","🟡","🔵"];
const SAFE=[0,8,13,21,26,34,39,47];

const PATH=[
  [6,0],[7,0],[8,0],[8,1],[8,2],[8,3],[8,4],
  [9,4],[10,4],[11,4],[12,4],[13,4],
  [14,5],[14,6],[13,6],[12,6],[11,6],[10,6],[9,6],[8,6],
  [8,7],[8,8],[7,8],[6,8],[5,8],[4,8],[3,8],[2,8],[1,8],
  [0,9],[0,10],[1,10],[2,10],[3,10],[4,10],[5,10],[6,10],
  [6,11],[6,12],[6,13],[6,14],[7,14],[8,14],
  [8,13],[8,12],[8,11],[9,10],[10,10],[11,10],[12,10],[13,10]
];

let players=[],current=0,dice=0,mode=1,gameOn=false;

/* ====== GAME START ====== */
function startGame(){
  mode=parseInt(document.getElementById("mode").value);
  players=[];
  for(let i=0;i<mode;i++){
    players.push({
      color:COLORS[i],
      bot:(mode===1 && i===1),
      tokens:[-1,-1,-1,-1]
    });
  }
  current=0;
  gameOn=true;
  draw();
  info.textContent=`Giliran ${EMOJI[current]}`;
}

/* ====== DRAW ====== */
function draw(){
  ctx.clearRect(0,0,360,360);
  ctx.fillStyle="#eee";
  ctx.fillRect(0,0,360,360);

  PATH.forEach(p=>{
    ctx.fillStyle="#ccc";
    ctx.fillRect(p[0]*24,p[1]*24,24,24);
  });

  players.forEach((pl,i)=>{
    pl.tokens.forEach(pos=>{
      if(pos>=0){
        const p=PATH[(pos+i*13)%52];
        ctx.fillStyle=pl.color;
        ctx.beginPath();
        ctx.arc(p[0]*24+12,p[1]*24+12,9,0,Math.PI*2);
        ctx.fill();
      }
    });
  });
}

/* ====== DICE ====== */
function rollDice(){
  if(!gameOn)return;
  dice=Math.floor(Math.random()*6)+1;
  diceEl.textContent=dice;
  info.textContent=`${EMOJI[current]} dapat ${dice}`;
  setTimeout(moveAuto,600);
}

/* ====== MOVE ====== */
function moveAuto(){
  const pl=players[current];
  let best=-1,bestScore=-999;

  pl.tokens.forEach((pos,i)=>{
    let score=0;
    if(pos===-1 && dice===6) score+=50;
    if(pos>=0) score+=pos;
    if(score>bestScore){bestScore=score;best=i;}
  });

  if(best!==-1){
    if(pl.tokens[best]===-1 && dice===6) pl.tokens[best]=0;
    else if(pl.tokens[best]>=0) pl.tokens[best]+=dice;
  }

  if(dice!==6) current=(current+1)%players.length;
  draw();
  info.textContent=`Giliran ${EMOJI[current]}`;
}
</script>
</body>
</html>
