<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAPUR | dyg++</title>
    <style>
        :root{ --main:#1B4332; --danger:#c0392b; --bg:#f2f4f7; }
        body{ margin:0; background:var(--bg); font-family:Segoe UI,Arial,sans-serif; }
        .header{ margin:15px; padding:15px 20px; background:white; border-radius:14px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 4px 10px rgba(0,0,0,.05); }
        .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:15px; padding:15px; }
        .card{ background:white; border-radius:16px; padding:18px; border-top:8px solid var(--main); animation:pop .3s ease; }
        .no{ font-size:38px; font-weight:900; color:var(--main); }
        .items{ margin:14px 0; font-family:Courier New,monospace; font-weight:900; }
        .btn{ width:100%; padding:16px; border:none; border-radius:12px; background:var(--main); color:white; font-weight:900; cursor:pointer; }
        .processing { background: #f59e0b !important; }
        .slide-out-left { transform: translateX(-150%); opacity: 0; transition: 0.5s; }
    </style>
</head>
<body>

<div class="header">
    <div><h2 style="margin:0">👨‍🍳 MONITOR DAPUR</h2><div id="status">● Menghubungkan...</div></div>
</div>
<div class="grid" id="list"></div>

<script>
const CONFIG = {
    API_URL: "https://script.google.com/macros/s/AKfycbwf1njeWKOdj9ZcbfuM-OlTHoUSCUp8QgS4HXMgUHsQBNJ3MOIkeiLxJfYMcmS1CQqsVg/exec",
    TOKEN: "dyg-access-v2",
    REFRESH: 8000 
};

let currentOrders = [];
let processingRows = new Set();

async function loadOrders() {
    try {
        const res = await fetch(`${CONFIG.API_URL}?token=${CONFIG.TOKEN}&action=getAntrean`);
        const data = await res.json();
        document.getElementById("status").innerText = "● TERHUBUNG";
        document.getElementById("status").style.color = "green";
        currentOrders = data;
        render(data);
    } catch(e) {
        document.getElementById("status").innerText = "● OFFLINE";
        document.getElementById("status").style.color = "red";
    }
}

function render(active){
    const box = document.getElementById("list");
    box.innerHTML = active.map(o => `
        <div class="card" id="c-${o.row}">
            <div class="no">#${o.Antrean}</div>
            <div style="font-weight:900; font-size:20px;">${o.Nama}</div>
            <div style="font-size:12px; background:#eee; padding:4px 8px; border-radius:8px; display:inline-block;">${o.Mode} ${o.Meja ? `| MEJA: ${o.Meja}` : ''}</div>
            <div class="items">${o.Pesanan.replace(/\n/g, '<br>')}</div>
            ${o.Catatan ? `<div style="background:#FFF9C4; padding:8px; border-left:4px solid #FBC02D; font-size:12px;">⚠️ <strong>Catatan:</strong> ${o.Catatan}</div>` : ''}
            <button class="btn" style="margin-top:15px;" onclick="finish(${o.row})">✔ SELESAI & CETAK</button>
        </div>`).join("");
}

async function finish(row) {
    if (processingRows.has(String(row))) return;
    const card = document.getElementById("c-" + row);
    const order = currentOrders.find(o => o.row == row);
    
    processingRows.add(String(row));
    card.querySelector('.btn').innerText = '⏳ MEMPROSES...';

    const res = await fetch(`${CONFIG.API_URL}?token=${CONFIG.TOKEN}&action=updateStatus&row=${row}`);
    if ((await res.text()).toLowerCase().includes("success")) {
        printOrder(order);
        card.classList.add("slide-out-left");
        setTimeout(() => { loadOrders(); }, 500);
    } else {
        alert("Gagal update status!");
    }
    processingRows.delete(String(row));
}

function printOrder(o) {
    let txt = `      dyg++ KITCHEN\n================================\n`;
    txt += `Antrean : #${o.Antrean}\nNama    : ${o.Nama}\nLayanan : ${o.Mode}\n`;
    if (o.Meja) txt += `Meja    : ${o.Meja}\n`;
    txt += `Waktu   : ${new Date().toLocaleTimeString()}\n--------------------------------\nPESANAN:\n${o.Pesanan}\n`;
    if (o.Catatan) txt += `--------------------------------\nCATATAN:\n${o.Catatan}\n`;
    txt += `--------------------------------\n\n\n\n`;

    if (/Android/i.test(navigator.userAgent)) {
        window.location.href = "rawbt:base64," + btoa(unescape(encodeURIComponent(txt)));
    } else {
        const pW = window.open('', '_blank', 'width=300,height=500');
        pW.document.write(`<pre style="font-family: monospace;">${txt}</pre>`);
        pW.document.write('<script>window.print(); window.close();<\/script>');
        pW.document.close();
    }
}

loadOrders();
setInterval(loadOrders, CONFIG.REFRESH);
</script>
</body>
</html>
