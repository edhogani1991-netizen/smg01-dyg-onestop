<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAPUR | dyg++</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        :root{ --main:#1B4332; --danger:#c0392b; --bg:#f2f4f7; }
        body{ margin:0; background:var(--bg); font-family:Segoe UI,Arial,sans-serif; }
        
        .header{ margin:15px; padding:15px 20px; background:white; border-radius:14px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 4px 10px rgba(0,0,0,.05); }
        #status{ font-weight:900; color:orange; font-size: 13px; }
        
        .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:15px; padding:15px; }
        .card{ background:white; border-radius:16px; padding:18px; border-top:8px solid var(--main); position:relative; animation:pop .3s ease; transition: all 0.5s ease; }
        @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
        
        .no{ font-size:38px; font-weight:900; color:var(--main); }
        .name{ font-size:20px; font-weight:900; }
        .mode{ display:inline-block; margin-top:4px; padding:4px 10px; border-radius:12px; font-size:11px; font-weight:900; background:#eee; }
        .items{ margin:14px 0; font-family:Courier New,monospace; font-weight:900; line-height:1.4; }
        .btn{ width:100%; padding:16px; border:none; border-radius:12px; background:var(--main); color:white; font-weight:900; cursor:pointer; }
        
        .btn-check-sound { background: #3b82f6; color: white; border: none; padding: 10px 14px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .voice-control { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 16px; border-radius: 12px; transition: all 0.2s ease; user-select: none; }
        .voice-off { background: #fee2e2; color: #991b1b; border: 2px solid #ef4444; }
        .voice-on { background: #dcfce7; color: #166534; border: 2px solid #22c55e; }
        .hidden { display: none !important; }
        .slide-out-left { transform: translateX(-150%) rotate(-10deg); opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h2 style="margin:0">👨‍🍳 MONITOR DAPUR</h2>
        <div id="status">● Menghubungkan...</div>
    </div>

    <div style="display: flex; gap: 10px; align-items: center;">
        <button id="checkSoundBtn" class="btn-check-sound hidden" onclick="speak('Tes suara dapur, satu dua tiga')">
            🎵 CEK SOUND
        </button>

        <div id="voiceBtn" class="voice-control voice-off" onclick="toggleVoice()">
            <span id="vIcon" class="voice-icon">🔇</span>
            <span id="vText" class="voice-text" style="font-size:12px; font-weight:800;">SUARA: MUTE</span>
        </div>
    </div>
</div>

<div class="grid" id="list"></div>

<script>
/* ================= CONFIG ================= */
const CONFIG = {
    API_URL: "https://script.google.com/macros/s/AKfycbxBjq3ZdtNIajG578Vjfu8gow9rgTx8rp9THrL4UG2UtnzivjvLmGyt2ii21L-_b22J6A/exec",
    TOKEN: "dyg-access-v2",
    REFRESH: 8000 
};

/* ================= STATE ================= */
let lastCount = 0;
let removedRows = []; 
let currentOrders = [];
let isVoiceEnabled = false; 

/* ================= VOICE LOGIC ================= */
function toggleVoice() {
    isVoiceEnabled = !isVoiceEnabled;
    const btn = document.getElementById("voiceBtn");
    const icon = document.getElementById("vIcon");
    const text = document.getElementById("vText");
    const checkBtn = document.getElementById("checkSoundBtn");

    if (isVoiceEnabled) {
        btn.className = "voice-control voice-on";
        icon.innerText = "🔊";
        text.innerText = "SUARA: ON";
        if(checkBtn) checkBtn.classList.remove("hidden");
        speak("Notifikasi suara aktif");
    } else {
        btn.className = "voice-control voice-off";
        icon.innerText = "🔇";
        text.innerText = "SUARA: MUTE";
        if(checkBtn) checkBtn.classList.add("hidden");
        window.speechSynthesis.cancel(); 
    }
}

function speak(txt) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'id-ID';
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }
}

/* ================= LOAD DATA ================= */
function loadOrders() {
    const url = `${CONFIG.API_URL}?token=${CONFIG.TOKEN}&action=getAntrean`;

    fetch(url)
        .then(r => r.json())
        .then(data => {
            document.getElementById("status").innerText = "● TERHUBUNG";
            document.getElementById("status").style.color = "green";
            
            // Gunakan rowId atau row (sesuaikan dengan output GAS Anda)
            const filteredData = data.filter(o => !removedRows.includes(String(o.row)));

            if (filteredData.length > lastCount && lastCount !== 0) {
                if (isVoiceEnabled) speak("Ada orderan baru masuk");
            }
            
            lastCount = filteredData.length;
            currentOrders = data; 
            render(filteredData);
        })
        .catch(e => {
            document.getElementById("status").innerText = "● OFFLINE / ERROR";
            document.getElementById("status").style.color = "red";
            console.error("Fetch Error:", e);
        });
}

/* ================= RENDER CARD ================= */
function render(active){
    const box = document.getElementById("list");
    if(!box) return;

    if(active.length === 0){
        box.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#999;padding:50px">Tidak ada pesanan baru</div>`;
        return;
    }

    box.innerHTML = active.map(o => {
        let daftarMenu = "";
        // Antisipasi perbedaan huruf besar/kecil dari properti JSON
        const pesananRaw = o.Pesanan || o.pesanan || "";
        const antrean = o.Antrean || o.antrean || "0";
        const nama = o.Nama || o.nama || "Tanpa Nama";
        const mode = o.Mode || o.mode || "DINE IN";
        const meja = o.Meja || o.meja || "";
        const catatan = o.Catatan || o.catatan || "";

        try {
            if (pesananRaw.trim().startsWith('{')) {
                const json = JSON.parse(pesananRaw);
                daftarMenu = Object.keys(json).map(m => `• ${json[m].qty}x ${m}`).join("<br>");
            } else {
                daftarMenu = pesananRaw.split(/,|\n/).map(i => `• ${i.trim()}`).filter(i => i !== "•").join("<br>");
            }
        } catch (e) {
            daftarMenu = `• ${pesananRaw}`;
        }

        return `
            <div class="card" id="c-${o.row}" data-row="${o.row}">
                <div class="no">#${antrean}</div>
                <div class="name">${nama}</div>
                <div class="mode">${mode} ${meja ? `<span style="color:var(--danger)">[ MEJA ${meja} ]</span>` : ''}</div>
                <div class="items">${daftarMenu}</div>
                ${catatan ? `<div style="background:#FFF9C4; padding:10px; border-left:5px solid #FBC02D; margin-top:12px; border-radius:8px; font-size:13px; color:#5D4037; line-height:1.4;"><strong>⚠️ CATATAN:</strong> ${catatan}</div>` : ''}
                <button class="btn" onclick="finish(${o.row})" style="margin-top:15px;">✔ SELESAI & CETAK</button>
            </div>`;
    }).join("");

    document.querySelectorAll(".card").forEach(card => {
        const mc = new Hammer(card);
        mc.on("swipeleft", () => finish(card.getAttribute("data-row")));
    });
}

/* ================= ACTION ================= */
function finish(row) {
    const orderData = currentOrders.find(o => o.row == row);
    const card = document.getElementById("c-" + row);
    
    if (card) card.classList.add("slide-out-left");
    if (!removedRows.includes(String(row))) removedRows.push(String(row));
    if (orderData) printOrder(orderData);

    fetch(`${CONFIG.API_URL}?token=${CONFIG.TOKEN}&action=updateStatus&row=${row}`).catch(() => {});

    setTimeout(() => { 
        if (card) card.remove();
        if (document.querySelectorAll('.card').length === 0) render([]);
    }, 500);
}

function printOrder(order) {
    const antrean = order.Antrean || order.antrean || "0";
    const nama = order.Nama || order.nama || "-";
    const mode = order.Mode || order.mode || "-";
    const pesanan = order.Pesanan || order.pesanan || "";
    const catatan = order.Catatan || order.catatan || "";

    let txt = `      dyg++ KITCHEN\n================================\nAntrean : #${antrean}\nNama    : ${nama}\nLayanan : ${mode}\n`;
    if (order.Meja || order.meja) txt += `Meja    : ${order.Meja || order.meja}\n`;
    txt += `Waktu   : ${new Date().toLocaleTimeString()}\n--------------------------------\nPESANAN:\n${pesanan}\n`;
    if (catatan) txt += `--------------------------------\nCATATAN:\n${catatan}\n`;
    txt += `--------------------------------\n\n\n\n`; 

    const base64Data = btoa(unescape(encodeURIComponent(txt)));
    window.location.href = "rawbt:base64," + base64Data;
}

/* ================= START ================= */
loadOrders();
setInterval(loadOrders, CONFIG.REFRESH);
</script>
</body>
</html>
