<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DYG FEEDER - Catch the Food</title>
    <style>
        :root {
            --primary: #1B4332; --accent: #00ff99; --danger: #ff3366; --gold: #f1c40f;
        }
        * { box-sizing: border-box; touch-action: none; }
        body { 
            margin: 0; background: #0a0a0a; color: #fff; overflow: hidden;
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        #game-canvas { background: linear-gradient(to bottom, #1B4332, #081c15); display: block; }

        .ui-overlay {
            position: absolute; top: 10px; width: 350px; display: flex; 
            justify-content: space-between; pointer-events: none;
        }
        .stat-box { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--accent); }
        .stat-label { font-size: 10px; color: var(--accent); text-transform: uppercase; }
        .stat-num { font-size: 18px; font-weight: 900; }

        /* Start & Game Over Screens */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .btn-start {
            background: var(--accent); color: #000; border: none; padding: 15px 40px;
            border-radius: 30px; font-weight: 900; font-size: 18px; cursor: pointer; margin-top: 20px;
        }

        .leaderboard {
            margin-top: 20px; width: 280px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;
        }
        .rank-item { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="start-screen" class="modal">
        <h1 style="color:var(--accent); font-size: 40px; margin: 0;">DYG FEEDER</h1>
        <p style="opacity: 0.7;">Tangkap Makanan, Hindari Bom!</p>
        <button class="btn-start" onclick="initGame()">MULAI MAIN</button>
        <div class="leaderboard">
            <h3 style="margin:0 0 10px 0; font-size: 14px; color:var(--gold);">🏆 TOP FEEDER</h3>
            <div id="rank-list"></div>
        </div>
    </div>

    <div class="ui-overlay">
        <div class="stat-box">
            <div class="stat-label">Score</div>
            <div id="score" class="stat-num">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Level</div>
            <div id="level" class="stat-num">1</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Health</div>
            <div id="health" class="stat-num">❤❤❤</div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // Pengaturan Ukuran Layar
    canvas.width = 360;
    canvas.height = window.innerHeight;

    let score = 0, level = 1, health = 3, gameActive = false;
    let items = [], particles = [];
    const player = { x: 180, y: canvas.height - 80, w: 70, h: 20 };

    // Aset Makanan (Emoji sebagai pengganti gambar agar cepat)
    const foods = ['🍔', '🍕', '🍟', '🍦', '🥤', '🍩', '🍗'];
    const bombs = ['💣'];

    function initGame() {
        document.getElementById('start-screen').style.display = 'none';
        score = 0; level = 1; health = 3; items = [];
        gameActive = true;
        updateUI();
        gameLoop();
    }

    // Spawn Makanan/Bom
    function spawnItem() {
        if (!gameActive) return;
        const isBomb = Math.random() < (0.1 + (level * 0.02)); // Bom makin banyak tiap level
        const content = isBomb ? bombs[0] : foods[Math.floor(Math.random() * foods.length)];
        
        items.push({
            x: Math.random() * (canvas.width - 30),
            y: -50,
            speed: (2 + Math.random() * 3) + (level * 0.5),
            content: content,
            isBomb: isBomb,
            size: 30
        });

        // Loop spawn
        setTimeout(spawnItem, Math.max(400, 1000 - (level * 50)));
    }

    function gameLoop() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Update & Draw Player (Mulut/Keranjang)
        ctx.fillStyle = '#00ff99';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00ff99';
        // Gambar bentuk keranjang lengkung
        ctx.beginPath();
        ctx.roundRect(player.x - player.w/2, player.y, player.w, player.h, 10);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Update & Draw Items
        items.forEach((item, index) => {
            item.y += item.speed;
            ctx.font = item.size + 'px Arial';
            ctx.fillText(item.content, item.x, item.y);

            // Cek Tabrakan (Collision)
            if (item.y + 10 >= player.y && 
                item.x > player.x - player.w/2 - 20 && 
                item.x < player.x + player.w/2) {
                
                if (item.isBomb) {
                    hitEffect();
                    health--;
                    if (health <= 0) gameOver();
                } else {
                    score += 10;
                    if (score % 100 === 0) level++;
                    createParticles(item.x, item.y, '#00ff99');
                }
                items.splice(index, 1);
                updateUI();
            }

            // Hilang di bawah
            if (item.y > canvas.height) {
                if (!item.isBomb) {
                   // Optional: health berkurang jika makanan terbuang
                }
                items.splice(index, 1);
            }
        });

        drawParticles();
        requestAnimationFrame(gameLoop);
    }

    // Efek Partikel saat Berhasil Tangkap
    function createParticles(x, y, color) {
        for(let i=0; i<8; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 5,
                vy: (Math.random() - 0.5) * 5,
                alpha: 1,
                color: color
            });
        }
    }

    function drawParticles() {
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
            ctx.fillStyle = `rgba(0, 255, 153, ${p.alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
            ctx.fill();
            if (p.alpha <= 0) particles.splice(i, 1);
        });
    }

    function hitEffect() {
        canvas.style.transform = 'translateX(10px)';
        setTimeout(() => canvas.style.transform = 'translateX(-10px)', 50);
        setTimeout(() => canvas.style.transform = 'translateX(0)', 100);
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('level').innerText = level;
        document.getElementById('health').innerText = "❤".repeat(health);
    }

    function gameOver() {
        gameActive = false;
        saveScore(score);
        alert("💥 GAME OVER!\nSkor Kamu: " + score);
        location.reload();
    }

    // Kontrol: Mouse & Touch
    window.addEventListener('mousemove', (e) => player.x = e.clientX);
    window.addEventListener('touchmove', (e) => {
        player.x = e.touches[0].clientX;
        e.preventDefault();
    }, {passive: false});

    // Leaderboard
    function saveScore(s) {
        let ranks = JSON.parse(localStorage.getItem('feeder_ranks')) || [];
        ranks.push({score: s, date: new Date().toLocaleDateString()});
        ranks.sort((a,b) => b.score - a.score);
        localStorage.setItem('feeder_ranks', JSON.stringify(ranks.slice(0, 5)));
    }

    function loadRank() {
        const ranks = JSON.parse(localStorage.getItem('feeder_ranks')) || [];
        const list = document.getElementById('rank-list');
        list.innerHTML = ranks.map((r,i) => `
            <div class="rank-item">
                <span>#${i+1} - ${r.date}</span>
                <b>${r.score} PTS</b>
            </div>
        `).join('');
    }

    loadRank();
    spawnItem();
</script>
</body>
</html>
