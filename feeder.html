<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DYG FEAST MASTER</title>
    <style>
        :root {
            --skin: #ffdbac; --hair: #4b2c20; --accent: #00ff99; --wall: #2c3e50;
        }
        * { box-sizing: border-box; touch-action: none; overflow: hidden; }
        body { 
            margin: 0; background: #1a1a1a; color: #fff; 
            font-family: 'Arial Rounded MT Bold', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ANIMATED CAFE BACKGROUND */
        #game-container {
            position: relative; width: 360px; height: 100vh;
            background: linear-gradient(to bottom, #34495e, #2c3e50);
            border-left: 4px solid #444; border-right: 4px solid #444;
            overflow: hidden;
        }
        
        /* Hiasan Jendela Cafe */
        .window {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 150px; background: #87ceeb;
            border: 8px solid #5d4037; box-shadow: 0 0 20px rgba(135,206,235,0.5);
        }
        .window::before { content: ''; position: absolute; top: 0; left: 50%; width: 8px; height: 100%; background: #5d4037; }
        .window::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 8px; background: #5d4037; }

        .table-surface {
            position: absolute; bottom: 0; width: 100%; height: 100px;
            background: #5d4037; border-top: 5px solid #3e2723;
        }

        /* UI OVERLAY */
        .ui {
            position: absolute; top: 20px; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; z-index: 10;
        }
        .glass-panel {
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            padding: 10px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
        }
        .stat-val { font-size: 20px; color: var(--accent); font-weight: 900; }
        .stat-lbl { font-size: 9px; text-transform: uppercase; opacity: 0.8; }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-play {
            background: var(--accent); color: #000; border: none; padding: 15px 50px;
            border-radius: 50px; font-weight: 900; font-size: 20px; cursor: pointer;
            box-shadow: 0 5px 0 #00965e;
        }
        .btn-play:active { transform: translateY(3px); box-shadow: none; }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="window"></div>
        <div class="table-surface"></div>

        <div class="ui">
            <div class="glass-panel">
                <div class="stat-lbl">Score</div>
                <div id="score" class="stat-val">0</div>
            </div>
            <div class="glass-panel" style="text-align: right;">
                <div class="stat-lbl">Level</div>
                <div id="level" class="stat-val">1</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="menu" class="modal">
            <h1 style="color:var(--accent); font-size: 42px; margin: 0;">FEAST MASTER</h1>
            <p style="margin-bottom: 30px; opacity: 0.7;">Pilih Karakter & Mulai</p>
            
            <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                <button onclick="startGame('boy')" class="btn-play" style="padding:10px 20px; font-size: 14px; background:#3498db;">♂️ COWOK</button>
                <button onclick="startGame('girl')" class="btn-play" style="padding:10px 20px; font-size: 14px; background:#e91e63;">♀️ CEWEK</button>
            </div>

            <div id="leaderboard" style="width: 280px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 20px;">
                <h3 style="margin:0 0 10px 0; font-size: 14px;">🏆 GLOBAL TOP FEEDER</h3>
                <div id="rank-list" style="font-size: 12px;"></div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 360;
    canvas.height = window.innerHeight;

    let score = 0, level = 1, gameActive = false, gender = 'boy';
    let items = [], particles = [];
    let playerX = 180;
    let mouthOpen = 0; // 0 to 1

    const foods = [
        {e: '🍔', s: 'BIG'}, {e: '🍕', s: 'SLI'}, {e: '🍦', s: 'COL'}, 
        {e: '🥤', s: 'DRK'}, {e: '🍗', s: 'HOT'}, {e: '🍩', s: 'SWT'}
    ];

    function startGame(g) {
        gender = g;
        document.getElementById('menu').style.display = 'none';
        score = 0; level = 1; items = []; gameActive = true;
        updateUI();
        spawnItem();
        animate();
    }

    function spawnItem() {
        if(!gameActive) return;
        
        const isBomb = Math.random() < (0.05 + (level * 0.02));
        items.push({
            x: 40 + Math.random() * (canvas.width - 80),
            y: -50,
            emoji: isBomb ? '💣' : foods[Math.floor(Math.random()*foods.length)].e,
            isBomb: isBomb,
            speed: 3 + (level * 0.5) + Math.random() * 2,
            wobble: Math.random() * 0.05, // Efek jatuh tidak lurus
            angle: 0
        });

        setTimeout(spawnItem, Math.max(500, 1200 - (level * 100)));
    }

    function drawPlayer() {
        ctx.save();
        ctx.translate(playerX, canvas.height - 120);

        // LEHER
        ctx.fillStyle = '#e0ac69';
        ctx.fillRect(-15, 60, 30, 20);

        // KEPALA (BASE)
        ctx.fillStyle = (gender === 'boy') ? '#4b2c20' : '#d81b60'; // Warna Rambut
        ctx.beginPath();
        ctx.arc(0, 0, 45, 0, Math.PI * 2);
        ctx.fill();

        // MUKA
        ctx.fillStyle = '#ffdbac';
        ctx.beginPath();
        ctx.arc(0, 10, 40, 0, Math.PI * 2);
        ctx.fill();

        // MATA
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(-15, 0, 5, 0, Math.PI * 2);
        ctx.arc(15, 0, 5, 0, Math.PI * 2);
        ctx.fill();

        // MULUT DINAMIS (MEMBUKA OTOMATIS)
        ctx.fillStyle = '#641e16';
        let mouthH = 5 + (mouthOpen * 35);
        ctx.beginPath();
        ctx.ellipse(0, 30, 20, mouthH, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // LIDAH (Hanya muncul kalau buka lebar)
        if(mouthOpen > 0.5) {
            ctx.fillStyle = '#ec7063';
            ctx.beginPath();
            ctx.ellipse(0, 30 + mouthH/2, 10, 5, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.restore();
    }

    function animate() {
        if(!gameActive) return;
        ctx.clearRect(0,0, canvas.width, canvas.height);

        // Cek jarak makanan terdekat untuk animasi mulut
        let nearestDist = 1000;
        
        items.forEach((item, i) => {
            // Gerak Realistis
            item.angle += item.wobble;
            item.x += Math.sin(item.angle) * 2;
            item.y += item.speed;

            // Draw Item
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(item.emoji, item.x, item.y);

            // Logic deteksi jarak ke mulut
            let dist = Math.hypot(item.x - playerX, item.y - (canvas.height - 90));
            if(dist < nearestDist) nearestDist = dist;

            // Collision (Tertangkap)
            if(dist < 40) {
                if(item.isBomb) gameOver();
                else {
                    score += 10;
                    if(score % 100 === 0) level++;
                    createExplosion(item.x, item.y);
                    items.splice(i, 1);
                    updateUI();
                }
            }

            if(item.y > canvas.height) items.splice(i, 1);
        });

        // Set mouthOpen berdasarkan jarak makanan (Makin dekat makin mangap)
        let targetMouth = (nearestDist < 150) ? (150 - nearestDist) / 100 : 0;
        mouthOpen += (targetMouth - mouthOpen) * 0.2;

        drawPlayer();
        drawParticles();
        requestAnimationFrame(animate);
    }

    function createExplosion(x, y) {
        for(let i=0; i<10; i++) {
            particles.push({
                x, y,
                vx: (Math.random()-0.5)*10,
                vy: (Math.random()-0.5)*10,
                life: 1,
                c: '#fff'
            });
        }
    }

    function drawParticles() {
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.05;
            ctx.fillStyle = `rgba(255,255,255,${p.life})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            if(p.life <= 0) particles.splice(i, 1);
        });
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('level').innerText = level;
    }

    function gameOver() {
        gameActive = false;
        saveScore(score);
        alert("🤢 Ouch! Kamu makan BOM!\nSkor Akhir: " + score);
        location.reload();
    }

    // Touch & Mouse Control
    window.addEventListener('mousemove', e => playerX = e.clientX);
    window.addEventListener('touchmove', e => {
        playerX = e.touches[0].clientX;
        e.preventDefault();
    }, {passive: false});

    function saveScore(s) {
        let h = JSON.parse(localStorage.getItem('feeder_hi')) || [];
        h.push({s, d: new Date().toLocaleDateString()});
        h.sort((a,b) => b.s - a.s);
        localStorage.setItem('feeder_hi', JSON.stringify(h.slice(0, 5)));
    }

    function loadRank() {
        const h = JSON.parse(localStorage.getItem('feeder_hi')) || [];
        document.getElementById('rank-list').innerHTML = h.map((x,i) => 
            `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #444">
                <span>#${i+1}</span><span>${x.d}</span><b>${x.s}</b>
            </div>`).join('');
    }

    loadRank();
</script>
</body>
</html>
