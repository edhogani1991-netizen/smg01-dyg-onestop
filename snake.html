<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐍 SNAKE PRO ULTRA - dyg++</title>
    <style>
        :root {
            --neon: #00ff99;
            --danger: #ff3366;
            --bg: #0a0a0b;
            --surface: #1c1c1e;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; touch-action: manipulation; }

        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .game-container {
            width: 350px;
            background: var(--surface);
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(0, 255, 153, 0.1);
            border: 1px solid #333;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 12px;
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 10px; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 18px; font-weight: 900; }

        canvas {
            background: #000;
            border-radius: 12px;
            display: block;
            margin: auto;
            border: 2px solid #333;
            box-shadow: inset 0 0 20px rgba(0,255,153,0.05);
        }

        /* GAMEBOT CONTROLS */
        .controls-area {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .btn-ctrl {
            width: 65px;
            height: 65px;
            background: #2c2c2e;
            border: none;
            border-radius: 18px;
            color: #fff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 0 #1a1a1b;
            transition: all 0.1s;
        }

        .btn-ctrl:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1a1a1b;
            background: var(--neon);
            color: #000;
        }

        .btn-up { grid-column: 2; }
        .btn-left { grid-column: 1; }
        .btn-right { grid-column: 3; }
        .btn-down { grid-column: 2; }

        .action-btns {
            width: 100%;
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-main {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-start { background: var(--neon); color: #000; }
        .btn-reset { background: #333; color: #fff; }

        /* LEADERBOARD */
        .leaderboard {
            margin-top: 20px;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 16px;
        }

        .leaderboard h3 {
            margin: 0 0 10px;
            font-size: 14px;
            color: var(--neon);
            text-align: center;
        }

        #rank-list {
            padding: 0;
            margin: 0;
            list-style: none;
        }

        #rank-list li {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #222;
            font-size: 13px;
        }

        #rank-list li span:last-child { font-weight: bold; color: var(--neon); }

        .config-row {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
        }

        select {
            flex: 1;
            background: #2c2c2e;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="stat-item">
            <div class="stat-label">Score</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div style="font-weight: 900; color: var(--neon); letter-spacing: 2px;">SNAKE PRO</div>
        <div class="stat-item">
            <div class="stat-label">Level</div>
            <div id="level" class="stat-value">1</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="320" height="320"></canvas>

    <div class="controls-area">
        <div class="config-row" style="width: 100%;">
            <select id="difficulty">
                <option value="easy">🟢 Santuy</option>
                <option value="normal" selected>🔵 Normal</option>
                <option value="hard">🔴 Pro</option>
                <option value="extreme">☠️ Legend</option>
            </select>
            <button class="btn-main btn-start" onclick="initGame()">MULAI</button>
        </div>

        <div class="d-pad">
            <button class="btn-ctrl btn-up" onclick="changeDirection('UP')">▲</button>
            <button class="btn-ctrl btn-left" onclick="changeDirection('LEFT')">◀</button>
            <button class="btn-ctrl btn-right" onclick="changeDirection('RIGHT')">▶</button>
            <button class="btn-ctrl btn-down" onclick="changeDirection('DOWN')">▼</button>
        </div>

        <div class="leaderboard" style="width: 100%;">
            <h3>🏆 TOP RANKS</h3>
            <ul id="rank-list"></ul>
            <button class="btn-main btn-reset" onclick="resetRank()" style="margin-top: 10px; font-size: 10px; padding: 5px;">Reset Peringkat</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const grid = 16;
    
    let snake, food, dx, dy, score, level, speed, gameInterval;
    let gameActive = false;

    const speedMap = { easy: 160, normal: 120, hard: 80, extreme: 50 };

    function initGame() {
        if(gameInterval) clearInterval(gameInterval);
        
        const diff = document.getElementById("difficulty").value;
        speed = speedMap[diff];
        
        snake = [{x: 160, y: 160}, {x: 144, y: 160}, {x: 128, y: 160}];
        dx = grid;
        dy = 0;
        score = 0;
        level = 1;
        gameActive = true;
        
        spawnFood();
        updateUI();
        gameInterval = setInterval(update, speed);
    }

    function spawnFood() {
        food = {
            x: Math.floor(Math.random() * (canvas.width / grid)) * grid,
            y: Math.floor(Math.random() * (canvas.height / grid)) * grid
        };
        // Cek agar tidak muncul di badan ular
        if(snake.some(s => s.x === food.x && s.y === food.y)) spawnFood();
    }

    function changeDirection(dir) {
        if(!gameActive) return;
        if(dir === 'UP' && dy === 0) { dx = 0; dy = -grid; }
        if(dir === 'DOWN' && dy === 0) { dx = 0; dy = grid; }
        if(dir === 'LEFT' && dx === 0) { dx = -grid; dy = 0; }
        if(dir === 'RIGHT' && dx === 0) { dx = grid; dy = 0; }
    }

    // Support Keyboard
    document.addEventListener('keydown', e => {
        if(e.key === "ArrowUp") changeDirection('UP');
        if(e.key === "ArrowDown") changeDirection('DOWN');
        if(e.key === "ArrowLeft") changeDirection('LEFT');
        if(e.key === "ArrowRight") changeDirection('RIGHT');
    });

    function update() {
        const head = { x: snake[0].x + dx, y: snake[0].y + dy };

        // Tabrak Tembok atau Badan
        if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || 
            snake.some(s => s.x === head.x && s.y === head.y)) {
            gameOver();
            return;
        }

        snake.unshift(head);

        // Makan
        if (head.x === food.x && head.y === food.y) {
            score += 10;
            if(score % 50 === 0) {
                level++;
                increaseSpeed();
            }
            spawnFood();
        } else {
            snake.pop();
        }

        draw();
        updateUI();
    }

    function increaseSpeed() {
        clearInterval(gameInterval);
        speed = Math.max(40, speed - 10);
        gameInterval = setInterval(update, speed);
    }

    function draw() {
        // Clear Background
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Food (Glow Effect)
        ctx.shadowBlur = 15;
        ctx.shadowColor = varColor('--danger');
        ctx.fillStyle = "#ff3366";
        ctx.beginPath();
        ctx.arc(food.x + grid/2, food.y + grid/2, grid/2 - 2, 0, Math.PI * 2);
        ctx.fill();

        // Draw Snake
        ctx.shadowBlur = 10;
        ctx.shadowColor = varColor('--neon');
        snake.forEach((part, i) => {
            ctx.fillStyle = i === 0 ? "#00ff99" : "#009966";
            // Rounded Rectangle
            fillRoundedRect(ctx, part.x + 1, part.y + 1, grid - 2, grid - 2, 4);
        });
        ctx.shadowBlur = 0; // Reset shadow
    }

    function fillRoundedRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
        ctx.fill();
    }

    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function updateUI() {
        document.getElementById("score").textContent = score;
        document.getElementById("level").textContent = level;
    }

    function gameOver() {
        gameActive = false;
        clearInterval(gameInterval);
        saveScore(score);
        alert("💀 MISSION FAILED\nSkor Akhir: " + score);
        loadLeaderboard();
    }

    /* LEADERBOARD LOGIC */
    function saveScore(s) {
        if(s <= 0) return;
        let ranks = JSON.parse(localStorage.getItem("dyg_snake_ranks")) || [];
        ranks.push({score: s, date: new Date().toLocaleDateString()});
        ranks.sort((a, b) => b.score - a.score);
        ranks = ranks.slice(0, 10);
        localStorage.setItem("dyg_snake_ranks", JSON.stringify(ranks));
    }

    function loadLeaderboard() {
        const ranks = JSON.parse(localStorage.getItem("dyg_snake_ranks")) || [];
        const list = document.getElementById("rank-list");
        list.innerHTML = ranks.length ? "" : "<li style='justify-content:center; opacity:0.5'>Belum ada data</li>";
        ranks.forEach((r, i) => {
            list.innerHTML += `<li><span>#${i+1} - ${r.date}</span> <span>${r.score} PTS</span></li>`;
        });
    }

    function resetRank() {
        if(confirm("Hapus semua peringkat?")) {
            localStorage.removeItem("dyg_snake_ranks");
            loadLeaderboard();
        }
    }

    // Load awal
    loadLeaderboard();
    draw(); // Draw empty board
</script>
</body>
</html>
