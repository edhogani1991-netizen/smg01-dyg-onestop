<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>dyg++ POS Ultra Compact V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #f1f5f9; font-size: 9px; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .main-container { height: calc(100vh - 45px); display: flex; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 4px; align-content: start; }
    .menu-card { 
    height: 115px; /* Sedikit lebih pendek dari sebelumnya agar proporsional */
    display: flex;
    flex-direction: column;
    padding: 4px;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    background: white;
}

    .menu-card:active { transform: scale(0.97); }
        input, select { outline: none; }
        /* Style untuk tombol disabled */
        button:disabled { background-color: #cbd5e1 !important; cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body class="h-screen flex flex-col">

<header class="h-[45px] bg-white border-b border-slate-200 px-3 flex justify-between items-center shrink-0">
    <div class="flex items-center gap-2">
        <h1 class="text-sm font-black text-blue-700 tracking-tighter">dyg++</h1>
        <div id="memberInfo" class="text-[8px] text-slate-400 italic truncate max-w-[100px]">Ready</div>
    </div>
    <div class="flex items-center gap-2">
        <button id="btnOpenShift" onclick="manageShift('open')" class="bg-emerald-600 text-white px-2 py-1 rounded text-[9px] font-bold hidden">BUKA SHIFT</button>
        
        <button id="btnCekTrx" onclick="cekDaftarTransaksi()" class="bg-indigo-600 text-white px-2 py-1 rounded text-[9px] font-bold uppercase">Cek Trx</button>
        
        <button id="btnCekPemasukan" onclick="cekPemasukan()" class="bg-amber-500 text-white px-2 py-1 rounded text-[9px] font-bold uppercase">Income</button>
        <button onclick="inputPengeluaran()" class="bg-red-600 text-white px-2 py-1 rounded text-[9px] font-bold uppercase">
    Pengeluaran
</button>
        <button id="btnCloseShift" onclick="manageShift('close')" class="bg-rose-600 text-white px-2 py-1 rounded text-[9px] font-bold hidden">TUTUP SHIFT</button>
    </div>
    <div class="flex items-center gap-1 border-l pl-2">
        <input id="nohp" type="text" placeholder="No WA (4 Digit)" onblur="cekMember()" class="bg-slate-100 rounded px-2 py-1 text-[9px] w-24">
        <button onclick="cekMember()" class="bg-blue-600 text-white px-2 py-1 rounded text-[9px] font-bold uppercase">Cek</button>
    </div>
<div class="flex items-center gap-1">
    <input id="voucher" type="text" placeholder="Kode Voucher" 
           onkeydown="if(event.key === 'Enter') applyVoucher()" 
           class="bg-yellow-50 border border-yellow-200 rounded px-2 py-1 text-[9px] w-20">
    <button onclick="applyVoucher()" class="bg-yellow-600 text-white px-2 py-1 rounded text-[9px] font-bold">OK</button>
</div>
<div id="memberInfo" class="text-[9px]"></div>
</header>

<main class="flex-1 overflow-hidden main-container">
    <section class="flex-1 flex flex-col bg-slate-50 overflow-hidden">
        <div class="p-1.5 flex gap-1.5 bg-white border-b border-slate-200">
            <input type="text" id="searchInput" oninput="renderMenu()" placeholder="Cari..." class="flex-1 px-2 py-1 bg-slate-100 rounded text-[10px]">
            <select id="categoryFilter" onchange="renderMenu()" class="bg-slate-100 rounded px-1 py-1 text-[9px] font-bold w-20">
                <option value="ALL">Semua</option>
            </select>
        </div>
        <div id="menuList" class="menu-grid p-1.5 overflow-y-auto custom-scroll flex-1"></div>
    </section>

    <section class="w-[260px] flex flex-col bg-white border-l border-slate-200 shrink-0">
        <div class="p-2 border-b flex justify-between items-center bg-slate-50">
            <span class="font-bold text-[9px] text-slate-500 uppercase">Keranjang</span>
            <button onclick="location.reload()" class="text-[8px] text-red-500 font-bold">RESET</button>
        </div>
        <div id="cartList" class="flex-1 overflow-y-auto custom-scroll p-1.5 space-y-1">
            <div class="text-center text-slate-300 mt-10 text-[9px]">Kosong</div>
        </div>

        <div class="p-2 bg-slate-50 border-t border-slate-200 space-y-2">
            <div id="pointDiscWrapper" class="hidden flex justify-between text-[9px] font-bold text-red-600 animate-pulse px-1">
                <span>DISKON MEMBER</span><span>- Rp <span id="pointDiscNominal">0</span></span>
            </div>
            <div class="flex justify-between items-center text-[10px] font-black px-1">
                <span class="text-slate-500 uppercase">Total</span>
                <span class="text-blue-700 text-base">Rp <span id="total">0</span></span>
            </div>
            <div class="space-y-1.5">
                <select id="metode" onchange="handleMetodeChange()" class="w-full border rounded p-1 text-[10px] font-bold bg-white">
    <option value="">-- PILIH METODE --</option>
    <option value="CASH">💵 TUNAI</option>
    <option value="QRIS">📱 QRIS</option>
    <option value="CARD">💳 KARTU / EDC</option>
</select>
                <div id="cashBox" class="space-y-1"></div>
                <button id="btnSubmitOrder" disabled onclick="submitOrder()" class="w-full bg-slate-400 text-white py-2 rounded font-bold text-[10px] uppercase shadow-sm transition-all">Mengecek Shift...</button>
            </div>
        </div>
    </section>
</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwt0ejL0NKjYH5gDzBi1UixMg5CdMWuXssTcAJlfkh3imGLc9K-VDK8-NscYUkFPzEdng/exec";
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQZGCGtu4xfKCj0zCGB2BldzF2fLjFCIOfVSXBAMeTM-3KGHfC9mZ_bhfaTnikwxd5427w4ULtotTJH/pub?gid=2132421401&single=true&output=csv";
const MEMBER_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSFTa4S3JgvUf20F_uinNgUF1ETfT4H2ZvFV-zqFVJ67Q4ANb544rqWZL_ychD1PCHI7E9hsmw7ihS6/pub?gid=1136451280&single=true&output=csv";
const VOUCHER_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQZGCGtu4xfKCj0zCGB2BldzF2fLjFCIOfVSXBAMeTM-3KGHfC9mZ_bhfaTnikwxd5427w4ULtotTJH/pub?gid=2009777502&single=true&output=csv";
const TOKEN = "dyg-access-v2";
let pointDiscount = 0;   // Diskon dari Poin Member
let voucherDiscount = 0; // Diskon dari Voucher CSV
let VOUCHER_LIST = []; // Variabel penampung data voucher 
let MENU = [], cart = {}, member = null, redeemQty = 0, shiftOpen = false, pendingOrder = null;
function closeModalTrx() {
    document.getElementById("modalTrx").classList.add("hidden");
    document.getElementById("modalTrx").classList.remove("flex");
}

// ==========================================
// 1. FUNGSI KONTROL MODAL & METODE (NEW)
// ==========================================
function openModalMetode() {
    const m = document.getElementById("modalMetode");
    m.classList.remove("hidden");
    m.classList.add("flex");
}

function closeModalMetode() {
    const m = document.getElementById("modalMetode");
    m.classList.add("hidden");
    m.classList.remove("flex");
}

function handleMetodeChange() {
    const m = document.getElementById("metode").value;
    if (m === "CASH") {
        renderCash();
    } else {
        document.getElementById("cashBox").innerHTML = "";
    }
}

function pilihMetodeManual(val) {
    document.getElementById("metode").value = val;
    closeModalMetode();
    handleMetodeChange();
    // Jika bukan CASH, langsung eksekusi submitOrder
    if (val !== "CASH") {
        submitOrder(); 
    } else {
        // Jika CASH, fokuskan ke input nominal uang
        setTimeout(() => {
            const bInp = document.getElementById("bayar");
            if(bInp) bInp.focus();
        }, 300);
    }
}

// ==========================================
// 2. LOGIKA TRANSAKSI UTAMA
// ==========================================
async function submitOrder() {
    const m = document.getElementById("metode").value;
    if (!m) { openModalMetode(); return; }

    if (m === "CASH") {
        const bayarInput = document.getElementById("bayar");
        if (!bayarInput || !bayarInput.value || Number(bayarInput.value) <= 0) {
            alert("Silakan masukkan nominal uang bayar!");
            if(bayarInput) bayarInput.focus();
            return;
        }
    }

    const btn = document.getElementById("btnSubmitOrder");
    const totalKotor = Object.values(cart).reduce((a, b) => a + (b.qty * b.harga), 0);
    
    // --- LOGIKA DISKON (POIN ATAU VOUCHER) ---
    let totalDiskon = 0;
    let labelDiskon = "Diskon"; 
    
    if (redeemQty > 0) {
        totalDiskon = pointDiscount;
        labelDiskon = "Diskon Poin";
    } else {
        const vInput = document.getElementById("voucher");
        if (vInput && vInput.value.trim() !== "") {
            // Pastikan fungsi hitungVoucher() sudah ada di skrip Anda
            totalDiskon = typeof hitungVoucher === 'function' ? hitungVoucher(vInput.value.trim()) : 0;
            labelDiskon = "Diskon Voucher";
        }
    }
    // -----------------------------------------

    const totalBersihAwal = totalKotor - totalDiskon;
    
    // --- TAMBAHAN LOGIKA PEMBULATAN ---
    let sisa = totalBersihAwal % 1000;
    const totalBersih = sisa >= 500 ? totalBersihAwal + (1000 - sisa) : totalBersihAwal - sisa;
    const nilaiPembulatan = totalBersih - totalBersihAwal;
    // ----------------------------------

    const trxId = "TRX-" + Date.now();
    const pesanan = Object.values(cart).map(i => `${i.nama} x${i.qty}`).join(", ");
    
    btn.innerText = "MENCETAK..."; btn.disabled = true;

    pendingOrder = { total: totalBersih, noWA: document.getElementById("nohp").value || "-", pesanan, metode: m, trxId };

    // --- FORMULASI STRUK (STRUKTUR TETAP SAMA) ---
    let esc = "\x1B\x40\x1B\x61\x01\x1B\x21\x10dyg++ CLOUD KITCHEN\x1B\x21\x00\n";
esc += "Alamat: UNNES, Gunungpati, Semarang\n";
esc += "NPWD  : P.1.9032024.14.11\n";
esc += "--------------------------------\n";
esc += "ID: " + trxId + "\n";
esc += "--------------------------------\n\x1B\x61\x00";
    
    Object.values(cart).forEach(i => {
        esc += `${i.nama}\n${i.qty} x ${i.harga.toLocaleString()} = ${(i.qty * i.harga).toLocaleString()}\n`;
    });
    
    esc += "--------------------------------\n";
    esc += "Total Kotor   : Rp " + totalKotor.toLocaleString() + "\n";
    
    // Menampilkan label diskon dinamis
    esc += `${labelDiskon} : Rp ${totalDiskon.toLocaleString()}\n`; 
    
    // --- TAMBAHAN PEMBULATAN DI STRUK ---
    if (nilaiPembulatan !== 0) {
        esc += "Pembulatan    : Rp " + (nilaiPembulatan > 0 ? "+" : "") + nilaiPembulatan.toLocaleString() + "\n";
    }
    // ------------------------------------

    esc += "Metode        : " + pendingOrder.metode + "\n";
    
    let namaMember = "-";
let poinDapat = "-";
let poinAkumulasi = "-";
let voucher = "-";

if (member) {
    namaMember = member.nama || "-";
    poinDapat = Math.floor(totalBersih / 20000) * 100;
    poinAkumulasi = (Number(member.poin) + poinDapat - redeemQty);
}

if (redeemQty > 0) {
    voucher = redeemQty;
}

esc += "Nama Member   : " + namaMember + "\n";
esc += "Poin Didapat  : " + (poinDapat === "-" ? "-" : "+" + poinDapat) + "\n";
esc += "Poin Akumulasi: " + poinAkumulasi + "\n";
esc += "Voucher       : " + voucher + "\n";
esc += "Diskon        : Rp " + (totalDiskon ? totalDiskon.toLocaleString() : "-") + "\n";
esc += "Pembulatan    : " + (nilaiPembulatan ? "Rp " + nilaiPembulatan.toLocaleString() : "-") + "\n";
    
    // --- PENYUSUNAN AKHIR STRUK ---
    // Pastikan PB1 dihitung dari totalBersih
    const pb1 = Math.round(totalBersih * 0.10);

    esc += "PB1 (10%)     : Rp " + pb1.toLocaleString() + " (Tanggung Resto)\n";
    esc += "--------------------------------\n";
    
    // Tambahkan baris TOTAL BERSIH dengan font lebih besar (\x1B\x21\x10)
    esc += "\x1B\x21\x10TOTAL BERSIH : Rp " + totalBersih.toLocaleString() + "\x1B\x21\x00\n";
    
    if (m === "CASH") {
        const bVal = Number(document.getElementById("bayar").value);
        esc += "--------------------------------\n";
        esc += "Bayar         : Rp " + bVal.toLocaleString() + "\n";
        esc += "Kembali       : Rp " + (bVal - totalBersih).toLocaleString() + "\n";
    }
    
    esc += "--------------------------------\n";
    esc += "\x1B\x61\x01TERIMA KASIH\n\n\n\n\n";

    // --- EKSEKUSI ---
    if (window.AppInventor) window.AppInventor.setWebViewString("PRINT|" + esc);
    
    prosesSimpanKeCloud(); 
    setTimeout(() => { location.reload(); }, 800);
}
// ==========================================
// 3. FUNGSI PENDUKUNG (TIDAK BERUBAH)
// ==========================================
async function cekPemasukan() {
    const btn = document.getElementById("btnCekPemasukan");
    const originalText = btn.innerText;
    try {
        btn.innerText = "..."; btn.disabled = true;
        const res = await fetch(`${API_URL}?token=${TOKEN}&action=getShiftReport`);
        const r = await res.json();
        
        if (r.status === "NO_ACTIVE_SHIFT") { 
            alert("Belum ada shift!"); 
            return; 
        }

        // Menyiapkan rincian pengeluaran
        let listExp = "";
        if (r.listPengeluaran && r.listPengeluaran.length > 0) {
            listExp = "\n=== PENGELUARAN ===\n" + r.listPengeluaran.join('\n');
        }

        // Kita gunakan r.modalAwal yang sekarang sudah pasti terisi dari server
        const rincian = `=== REAL-TIME REPORT ===\n` +
            `Shift    : ${r.shiftName}\n` +
            `-----------------------\n` +
            `Trx      : ${r.totalTrx}\n` +
            `Member   : ${r.totalMemberTrx || 0}\n` +
            `-----------------------\n` +
	    `Modal    : Rp ${(r.modalAwal || 0).toLocaleString()}\n` +
            `KOTOR    : Rp ${(r.pemasukanKotor || 0).toLocaleString()}\n` +
            `DISKON   : Rp ${(r.totalDiskon || 0).toLocaleString()}\n` +
	    `TOTAL PENGELUARAN : Rp ${r.totalPengeluaran ? r.totalPengeluaran.toLocaleString() : "0"}\n` +
            `-----------------------\n` +
            `CASH     : Rp ${(r.cash || 0).toLocaleString()}\n` +
            `QRIS     : Rp ${(r.qris || 0).toLocaleString()}\n` +
            `CARD     : Rp ${(r.card || 0).toLocaleString()}\n` +
            `-----------------------\n` +
            `BERSIH   : Rp ${(r.pemasukanBersih || 0).toLocaleString()}\n` +
            `${listExp}\n` + 
            `-----------------------\n` +
            `Poin Baru : ${r.totalPoinDapat || 0}\n` +
            `Poin Cair : ${r.totalPoinRedeem || 0}`;
            
        alert(rincian);
    } catch (e) { 
        alert("Gagal memuat data!"); 
    } finally { 
        btn.innerText = originalText; 
        btn.disabled = false; 
    }
}
async function checkShiftStatus() {
    const btnSubmit = document.getElementById("btnSubmitOrder");
    try {
        const res = await fetch(`${API_URL}?token=${TOKEN}&action=getShiftStatus`);
        const status = await res.text();
        shiftOpen = (status === "OPEN");
        document.getElementById("btnOpenShift").classList.toggle("hidden", shiftOpen);
        document.getElementById("btnCloseShift").classList.toggle("hidden", !shiftOpen);
        if (shiftOpen) {
            btnSubmit.disabled = false;
            btnSubmit.innerText = "BAYAR & CETAK";
            btnSubmit.className = "w-full bg-blue-600 text-white py-2 rounded font-bold text-[10px] uppercase shadow-sm";
        } else {
            btnSubmit.disabled = true;
            btnSubmit.innerText = "BUKA SHIFT DULU";
            btnSubmit.className = "w-full bg-rose-500 text-white py-2 rounded font-bold text-[10px] uppercase shadow-sm";
        }
    } catch (e) { btnSubmit.innerText = "ERROR KONEKSI"; }
}
async function loadMenu() {
    const response = await fetch(CSV_URL);
    const data = await response.text();
    const rows = data.split("\n").slice(1);
    
    MENU = rows.map(row => {
        // Asumsi: kolom A=kategori, B=nama, C=harga, D=..., E=gambar
        const c = row.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
        return { 
            kategori: c[0]?.trim(), 
            nama: c[1]?.trim(), 
            harga: parseInt(c[2]) || 0,
            gambar: c[4]?.trim() || '' // Mengambil kolom E
        };
    }).filter(m => m.nama);    
    const cats = [...new Set(MENU.map(m => m.kategori))];
    const select = document.getElementById("categoryFilter");
    select.innerHTML = '<option value="ALL">Semua</option>';
    cats.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
    renderMenu();
}

function renderMenu() {
    const list = document.getElementById("menuList");
    const search = document.getElementById("searchInput").value.toLowerCase();
    const filter = document.getElementById("categoryFilter").value;
    let html = "";
    
    MENU.forEach((m, i) => {
        if ((filter === "ALL" || m.kategori === filter) && m.nama.toLowerCase().includes(search)) {
            const qty = cart[i] ? cart[i].qty : 0;
            
            // Perubahan: Tambahkan class 'relative' di div utama .menu-card
            html += `
            <div class="menu-card shadow-sm flex flex-col justify-between relative">
                <div onclick="addItem(${i})" class="cursor-pointer flex flex-col flex-1 overflow-hidden">
                    ${m.gambar ? `<div class="h-9 w-full mb-1 flex items-center justify-center bg-slate-50 rounded overflow-hidden shrink-0">
                        <img src="${m.gambar}" class="w-full h-full object-cover" onerror="this.style.display='none'">
                    </div>` : ''}
                    
                    <div class="text-[6px] font-bold text-blue-500 uppercase truncate px-0.5">${m.kategori}</div>
                    <div class="font-bold text-slate-800 text-[7px] leading-[9px] line-clamp-2 px-0.5 mb-auto">${m.nama}</div>
                </div>
                
                <div class="flex justify-between items-center border-t pt-1 shrink-0 px-0.5">
                    <div class="text-[8px] font-black text-slate-900 truncate pr-1">Rp${m.harga.toLocaleString()}</div>
                    <div class="flex items-center gap-1 shrink-0">
                        ${qty > 0 ? `<button onclick="event.stopPropagation(); removeItem(${i})" class="w-4 h-4 bg-slate-100 rounded text-[8px] font-bold border border-slate-300">-</button>` : ''}
                        <button onclick="event.stopPropagation(); addItem(${i})" class="w-4 h-4 bg-blue-600 text-white rounded text-[8px] font-bold">+</button>
                    </div>
                </div>
                
                ${qty > 0 ? `<div class="absolute -top-1 -right-1 bg-red-600 text-white text-[7px] w-4 h-4 rounded-full flex items-center justify-center font-bold border border-white z-20 shadow-sm">${qty}</div>` : ''}
            </div>`;
        }
    });
    list.innerHTML = html;
}

function addItem(i) {
    if (!cart[i]) cart[i] = { ...MENU[i], qty: 0 };
    cart[i].qty++;
    updateUI();
}

function removeItem(i) {
    if(!cart[i]) return;
    cart[i].qty--;
    if (cart[i].qty <= 0) delete cart[i];
    updateUI();
}

function updateUI() {
    renderCart();
    renderMenu();
}

function renderCart() {
    // 1. Panggil validasi voucher otomatis (update nilai voucherDiscount)
    validateAndApplyVoucher();

    const list = document.getElementById("cartList");
    let html = "", total = 0;
    const items = Object.keys(cart);

    if (items.length === 0) {
        list.innerHTML = '<div class="text-center text-slate-300 text-[10px] mt-10">Kosong</div>';
        document.getElementById("total").innerText = "0";
        document.getElementById("pointDiscWrapper").classList.add("hidden");
        document.getElementById("cashBox").innerHTML = "";
        return;
    }

    // 2. Loop item untuk menghitung total kotor
    items.forEach(i => {
        const item = cart[i];
        total += item.qty * item.harga;
        html += `<div class="flex justify-between items-center bg-slate-50 p-1.5 rounded border border-slate-100 mb-1">
            <div class="flex flex-col flex-1 overflow-hidden mr-2">
                <span class="font-bold text-[9px] truncate">${item.nama}</span>
                <span class="text-[8px] text-slate-500">@${item.harga.toLocaleString()}</span>
            </div>
            <div class="flex items-center gap-1.5">
                <button onclick="removeItem(${i})" class="w-4 h-4 bg-white border rounded text-[9px]">－</button>
                <span class="font-bold text-[9px]">${item.qty}</span>
                <button onclick="addItem(${i})" class="w-4 h-4 bg-white border rounded text-[9px]">＋</button>
            </div>
        </div>`;
    });

    // 3. Hitung total diskon (Poin Member + Voucher)
    const totalDiskon = pointDiscount + voucherDiscount;
    let bersih = Math.max(0, total - totalDiskon);

    // --- TAMBAHAN PEMBULATAN ---
    let sisa = bersih % 1000;
    bersih = sisa >= 500 ? bersih + (1000 - sisa) : bersih - sisa;
    // ---------------------------

    // 4. Update UI
    list.innerHTML = html;
    document.getElementById("total").innerText = bersih.toLocaleString();

    // 5. Tampilkan Wrapper jika ada diskon yang aktif
    const discWrapper = document.getElementById("pointDiscWrapper");
    if (totalDiskon > 0) {
        discWrapper.classList.remove("hidden");
        document.getElementById("pointDiscNominal").innerText = totalDiskon.toLocaleString();
    } else {
        discWrapper.classList.add("hidden");
    }

    // 6. Render box bayar jika metode CASH
    if (document.getElementById("metode").value === "CASH") renderCash();
}

function renderCash() {
    const box = document.getElementById("cashBox");
    const total = Number(document.getElementById("total").innerText.replace(/\D/g,''));
    if (total <= 0) { box.innerHTML = ""; return; }
    const denoms = [2000, 5000, 10000, 20000, 50000, 100000];
    let btns = `<button onclick="quickCash(${total})" class="flex-1 bg-blue-600 text-white p-1 rounded text-[8px] font-bold">PAS</button>`;
    denoms.forEach(d => { if(d > total) btns += `<button onclick="quickCash(${d})" class="flex-1 bg-white border border-blue-200 p-1 rounded text-[8px] font-bold text-blue-700">${d/1000}K</button>`; });
    box.innerHTML = `<div class="bg-blue-50 p-1.5 rounded space-y-1">
        <div class="flex gap-1 flex-wrap">${btns}</div>

    if (!member) return;
    
    const poin = parseInt(member.poin);
    
    if (poin >= 500) {
        let maxTukar = Math.floor(poin / 500) * 500;
        if (confirm(`Poin ${member.nama} adalah ${poin}. Tukarkan ${maxTukar} poin (Rp${(maxTukar * 10).toLocaleString()})?`)) {
            redeemQty = maxTukar; 
            pointDiscount = maxTukar * 10; 
            renderCart(); // Memperbarui tampilan harga
        }
    } else {
        // Notifikasi jika poin belum cukup saat diklik
        alert(`Poin ${member.nama} saat ini ${poin}. Belum memenuhi syarat minimum 500 poin.`);
    }
}

// Perbarui fungsi loadVoucher menjadi seperti ini
async function loadVoucher() {
    try {
        const response = await fetch(VOUCHER_CSV);
        const csv = await response.text();
        const rows = csv.split("\n").slice(1);
        
        VOUCHER_LIST = rows.filter(row => row.trim() !== "").map(row => {
            const cols = row.split(",");
            return { 
                kode: cols[0].trim().toUpperCase(),
                menu: cols[1].trim(),
                kategori: cols[2].trim(),
                nilai: parseFloat(cols[3]) || 0,
                tipe: cols[4].trim(), // '%' atau 'nominal'
                tglMulai: new Date(cols[5]),
                tglBerakhir: new Date(cols[6]),
                minBelanja: parseFloat(cols[7]) || 0,
                maxDiskon: parseFloat(cols[8]) || 0
            };
        });
        console.log("Voucher dimuat:", VOUCHER_LIST);
    } catch (err) { console.error("Gagal memuat voucher:", err); }
}

function hitungVoucher(kode) {
    const totalKotor = Object.values(cart).reduce((a, b) => a + (b.qty * b.harga), 0);
    const today = new Date();
    
    // Cari voucher di list
    const v = VOUCHER_LIST.find(item => item.kode === kode.trim().toUpperCase());

    if (!v) {
        alert("Kode voucher tidak ditemukan!");
        return 0;
    }

    // Cek Tanggal
    if (today < v.tglMulai || today > v.tglBerakhir) {
        alert("Voucher sudah kedaluwarsa!");
        return 0;
    }

    // Cek Minimal Belanja
    if (totalKotor < v.min_belanja) {
        alert(`Minimal belanja Rp ${v.min_belanja.toLocaleString()} untuk voucher ini!`);
        return 0;
    }

    // Hitung Nominal Diskon
    let diskon = 0;
    if (v.tipe === "%") {
        diskon = (v.nilai / 100) * totalKotor;
    } else {
        diskon = v.nilai;
    }

    // Batasi dengan Max Diskon
    if (v.max_diskon > 0 && diskon > v.max_diskon) {
        diskon = v.max_diskon;
    }

    return Math.floor(diskon);
}
// Tambahkan fungsi ini di script Anda
function triggerVoucher() {
    const vInput = document.getElementById("voucher").value;
    if (vInput.length > 0) {
        const diskon = hitungVoucher(vInput);
        if (diskon > 0) {
            pointDiscount = diskon; // Mengupdate variabel global
            // Tampilkan di UI
            document.getElementById("pointDiscNominal").innerText = diskon.toLocaleString();
            document.getElementById("pointDiscWrapper").classList.remove("hidden");
            renderCart(); // Memaksa perhitungan ulang total
        }
    } else {
        // Jika input dihapus/kosong
        pointDiscount = 0;
        document.getElementById("pointDiscWrapper").classList.add("hidden");
        renderCart();
    }
}

function applyVoucher() {
    const vInput = document.getElementById("voucher").value;
    if (!vInput) return;

    window.appliedVoucherCode = vInput;

        alert("Belanja belum mencapai minimum Rp " + v.minBelanja.toLocaleString());
    } else {
        alert("Voucher berhasil dipasang!");
    }
    
    renderCart(); // Perbarui tampilan
}

function validateAndApplyVoucher() {
    const code = window.appliedVoucherCode;
    if (!code) {
        voucherDiscount = 0;
        return;
    }

    const totalKotor = Object.values(cart).reduce((a, b) => a + (b.qty * b.harga), 0);
    const v = VOUCHER_LIST.find(item => item.kode === code.trim().toUpperCase());
    
    // Logika yang diperbaiki:
    if (!v) {
        voucherDiscount = 0;
    } else if (totalKotor < v.minBelanja) {
        // Jika total kotor kurang dari syarat, set diskon ke 0
        voucherDiscount = 0; 
    } else {
        // Hitung diskon
        let diskon = (v.tipe === "%") ? (v.nilai / 100) * totalKotor : v.nilai;
        // Batasi dengan Max Diskon
        if (v.maxDiskon > 0 && diskon > v.maxDiskon) diskon = v.maxDiskon;
        voucherDiscount = Math.floor(diskon);
    }
}
// Membuka Modal
function inputPengeluaran() {
    document.getElementById("modalPengeluaran").classList.remove("hidden");
    document.getElementById("modalPengeluaran").classList.add("flex");
}

// Menutup Modal
function closeModalExp() {
    document.getElementById("modalPengeluaran").classList.add("hidden");
}

// Menyimpan ke Backend
async function saveExpense() {
    const nama = document.getElementById("expNama").value;
    const harga = document.getElementById("expHarga").value;
    const jumlah = document.getElementById("expJumlah").value;

    if (!nama || !harga || !jumlah) {
        alert("Harap lengkapi semua data!");
        return;
    }

    closeModalExp();
    const loader = document.getElementById("fullLoader");
    loader.classList.remove("hidden");
    loader.classList.add("flex");

    try {
        const url = `${API_URL}?token=${TOKEN}&action=addExpense&nama=${encodeURIComponent(nama)}&harga=${harga}&jumlah=${jumlah}`;
        const response = await fetch(url);
        const result = await response.text();
        
        if (result === "SUCCESS") {
            alert("Pengeluaran berhasil dicatat!");
            // Reset input setelah berhasil
            document.getElementById("expNama").value = "";
            document.getElementById("expHarga").value = "";
            document.getElementById("expJumlah").value = "";
        } else if (result === "NO_SHIFT") {
            alert("Gagal: Shift belum dibuka! Silakan buka shift terlebih dahulu.");
        } else {
            alert("Gagal mencatat pengeluaran. Cek kembali data Anda.");
        }
    } catch (e) {
        alert("Error koneksi!");
    } finally {
        loader.classList.add("hidden");
    }
}
function scrollModal(direction) {
    const container = document.getElementById("listTrxContent");
    if (container) {
        const scrollAmount = 250; // Jarak geser 250px
        container.scrollBy({
            top: direction === 'down' ? scrollAmount : -scrollAmount,
            behavior: 'smooth'
        });
    }
}

</script>
